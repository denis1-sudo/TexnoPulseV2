services:
  # --- База данных ---
  postgres:
    image: postgres:15-alpine
    container_name: texnopulse-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Бэкенд (Node.js) ---
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: texnopulse-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./back-end/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # --- Nginx + Frontend ---
  nginx:
    build:
      context: ./Front
      dockerfile: Dockerfile
    container_name: texnopulse-web
    ports:
      - '80:80'
    volumes:
      # Подключаем конфиг из корня проекта (где лежит docker-compose.yml)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
