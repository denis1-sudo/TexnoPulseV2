version: '3.8'

services:
  # Backend service (Node.js)
  backend:
    build:
      context: ./bek-end
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=production
    volumes:
      - ./bek-end/uploads:/app/uploads  # если нужно сохранять загрузки
    restart: unless-stopped
    networks:
      - app-network

  # Frontend build stage (Vue + Vite)
  frontend-build:
    build:
      context: ./Front
      dockerfile: Dockerfile.frontend.build
    image: frontend-built:latest
    volumes:
      - frontend-dist:/app/dist  # сохраняем собранные файлы в volume
    networks:
      - app-network

  # Nginx service (serves frontend + proxies to backend)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro  # монтируем собранный фронтенд
    depends_on:
      - backend
      - frontend-build
    restart: unless-stopped
    networks:
      - app-network

volumes:
  frontend-dist:  # named volume для передачи собранного фронтенда в nginx

networks:
  app-network:
    driver: bridge