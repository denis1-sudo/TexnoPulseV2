server {
    listen 80;
    server_name _; # Точка с запятой здесь обязательна

    root /usr/share/nginx/html; # Без пробелов внутри пути
    index index.html;

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    # Типы MIME пишутся слитно, через пробел, и строка заканчивается ;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html; # Точка с запятой в конце
    }

    location /api/ {
        proxy_pass http://backend:3000/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable"; # Точка с запятой в конце
    }
}